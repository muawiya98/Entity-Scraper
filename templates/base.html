<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app_title">Entity Scraper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="logo">🔎</span>
            <a href="{{ url_for('index') }}" class="brand-name" data-i18n="app_title">Entity Scraper</a>
        </div>
        <nav class="nav">
            <a href="{{ url_for('index') }}" data-i18n="nav_new">New Search</a>
            <a href="{{ url_for('searches_page') }}" data-i18n="nav_history">History</a>
        </nav>
        <div class="lang-switch">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="ar">عربي</button>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span data-i18n="footer">Entity Scraper · search · scrape · store</span>
    </footer>

    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
